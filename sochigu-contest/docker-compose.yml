version: '3.9'

# Полный Docker-запуск (prod-like).
# Для локальной разработки используй: npm run dev (в sochigu-contest/)

services:
  postgres:
    image: postgres:16-alpine
    container_name: sochigu_db
    environment:
      POSTGRES_DB: sochigu_contest
      POSTGRES_USER: sochigu
      POSTGRES_PASSWORD: sochigu_pass
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sochigu -d sochigu_contest']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: sochigu_backend
    env_file: ./backend/.env
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: sochigu_frontend
    ports:
      - '5173:5173'
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
  uploads:
